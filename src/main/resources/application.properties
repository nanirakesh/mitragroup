# !!! WARNING: THIS FILE CONTAINS DEFAULT, INSECURE CONFIGURATIONS FOR DEVELOPMENT ONLY !!!
# !!! DO NOT USE THESE SETTINGS IN A PRODUCTION ENVIRONMENT.                            !!!
# !!! USE ENVIRONMENT VARIABLES OR A SECURE SECRET MANAGEMENT SERVICE FOR PRODUCTION.   !!!

# It is strongly recommended to use Spring Profiles to separate development and production configurations.
# For example, create application-dev.properties and application-prod.properties.

spring.application.name=mitra
server.port=8080

# --- Database Configuration ---
# For development, H2 is used. For production, configure a persistent database like PostgreSQL or MySQL.
# In a production profile, you should set spring.jpa.hibernate.ddl-auto=validate or none.
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console is enabled for development. This should be disabled in production.
spring.h2.console.enabled=true

# --- Email Configuration ---
# DO NOT hardcode credentials. Use environment variables or a secrets management service.
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME:your-email@example.com}
spring.mail.password=${GMAIL_APP_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com

# --- Security Configuration ---
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# Set to true in production when using HTTPS
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.name=MITRASESSIONID
server.servlet.session.tracking-modes=cookie
# For production, consider using a persistent session store like 'jdbc' or 'redis'.
spring.session.store-type=none
server.error.include-stacktrace=never
server.error.include-message=never

# --- Security Headers ---
# The X-XSS-Protection header is deprecated. A strong Content-Security-Policy is the recommended replacement.
spring.security.headers.frame=deny
spring.security.headers.content-type=nosniff
spring.security.headers.referrer-policy=strict-origin-when-cross-origin

# --- Application Configuration ---
# Use strong, randomly generated secrets and manage them outside of version control.
app.jwt.secret=${JWT_SECRET:fallback-jwt-secret-for-dev-only-change-in-prod}
# 30 minutes
app.jwt.expiration=1800000

# Default admin credentials. CHANGE THESE and manage them securely.
app.admin.email=${ADMIN_EMAIL:admin@mitra.com}
app.admin.password=${ADMIN_PASSWORD:admin123}

app.max-login-attempts=5
app.lockout-duration=15

# --- Razorpay Configuration ---
# Store these keys securely as environment variables.
razorpay.key.id=${RAZORPAY_KEY_ID:rzp_test_YOUR_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:YOUR_KEY_SECRET}

# --- AI Configuration ---
openai.api.key=${OPENAI_API_KEY:}
ai.matching.enabled=${AI_MATCHING_ENABLED:true}

# --- IoT Integration Configuration ---
iot.webhook.url=${IOT_WEBHOOK_URL:http://localhost:8080/api/iot/webhook}
iot.processing.enabled=${IOT_PROCESSING_ENABLED:true}

# --- Blockchain Configuration ---
blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.network.name=${BLOCKCHAIN_NETWORK:testnet}

# --- Voice Assistant Configuration ---
voice.processing.enabled=${VOICE_PROCESSING_ENABLED:true}
voice.upload.directory=uploads/audio/

# --- Multi-Language Configuration ---
translation.enabled=${TRANSLATION_ENABLED:true}
app.default.language=en
app.supported.languages=en,es,fr,de,it,pt,hi,zh,ja,ko,ar,ru

# --- Advanced Analytics Configuration ---
analytics.enabled=${ANALYTICS_ENABLED:true}
analytics.batch.size=1000
analytics.processing.interval=300000

# --- File Upload Configuration ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
file.upload.directory=uploads/

# --- Monitoring & Metrics ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# --- Async Processing Configuration ---
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=mitra-async-

# --- AR/Computer Vision Configuration ---
opencv.enabled=${OPENCV_ENABLED:false}
ar.processing.enabled=${AR_PROCESSING_ENABLED:false}
image.processing.directory=uploads/images/

# --- Notification Configuration ---
notification.push.enabled=${PUSH_NOTIFICATIONS_ENABLED:true}
notification.email.enabled=${EMAIL_NOTIFICATIONS_ENABLED:true}
notification.sms.enabled=${SMS_NOTIFICATIONS_ENABLED:false}

# --- Geolocation Configuration ---
geolocation.api.key=${GEOLOCATION_API_KEY:}
geolocation.provider=${GEOLOCATION_PROVIDER:google}
proximity.search.radius=50

# --- Performance Configuration ---
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
