<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Mitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        .payment-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .payment-card { border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-radius: 15px; }
        .amount-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark payment-gradient">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/user/dashboard">
                <i class="fas fa-home me-2"></i>Mitra
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card payment-card">
                    <div class="card-header bg-primary text-white text-center">
                        <h4 class="mb-0"><i class="fas fa-credit-card me-2"></i>Secure Payment</h4>
                        <small>Powered by Razorpay</small>
                    </div>
                    <div class="card-body p-4">
                        <div class="amount-display mb-4">
                            <h6 class="mb-2">Amount to Pay</h6>
                            <h2 class="mb-0">₹<span th:text="${amount}"></span></h2>
                            <small>Service: <span th:text="${serviceRequest.title}"></span></small>
                        </div>

                        <div class="text-center mb-4">
                            <p class="mb-3">Pay securely using:</p>
                            <div class="row">
                                <div class="col-3 text-center">
                                    <i class="fas fa-credit-card fa-2x text-primary mb-2"></i>
                                    <br><small>Cards</small>
                                </div>
                                <div class="col-3 text-center">
                                    <i class="fas fa-mobile-alt fa-2x text-success mb-2"></i>
                                    <br><small>UPI</small>
                                </div>
                                <div class="col-3 text-center">
                                    <i class="fas fa-university fa-2x text-info mb-2"></i>
                                    <br><small>Net Banking</small>
                                </div>
                                <div class="col-3 text-center">
                                    <i class="fas fa-wallet fa-2x text-warning mb-2"></i>
                                    <br><small>Wallets</small>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-success btn-lg" onclick="payNow()" id="payButton">
                                <i class="fas fa-lock me-2"></i>Pay ₹<span th:text="${amount}"></span>
                            </button>
                            <a th:href="@{/user/request/{id}(id=${serviceRequest.id})}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left me-2"></i>Back
                            </a>
                        </div>

                        <div class="mt-4 p-3 bg-light rounded">
                            <h6 class="mb-2"><i class="fas fa-shield-alt text-success me-2"></i>100% Secure Payment</h6>
                            <div class="row">
                                <div class="col-6">
                                    <small><i class="fas fa-check text-success me-1"></i>256-bit SSL encryption</small>
                                </div>
                                <div class="col-6">
                                    <small><i class="fas fa-check text-success me-1"></i>PCI DSS compliant</small>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:inline="javascript">
        function payNow() {
            var options = {
                "key": /*[[${razorpayKeyId}]]*/ "rzp_test_YOUR_KEY_ID",
                "amount": /*[[${amount}]]*/ 500 * 100, // Amount in paise
                "currency": "INR",
                "name": "Mitra Services",
                "description": /*[[${serviceRequest.title}]]*/ "Service Payment",
                "order_id": /*[[${orderId}]]*/ "",
                "handler": function (response) {
                    // Payment successful
                    document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
                    document.getElementById('razorpay_order_id').value = response.razorpay_order_id;
                    document.getElementById('razorpay_signature').value = response.razorpay_signature;
                    document.getElementById('paymentForm').submit();
                },
                "prefill": {
                    "name": /*[[${user.firstName + ' ' + user.lastName}]]*/ "Customer Name",
                    "email": /*[[${user.email}]]*/ "customer@example.com",
                    "contact": /*[[${user.phone}]]*/ "9999999999"
                },
                "theme": {
                    "color": "#667eea"
                }
            };
            
            var rzp = new Razorpay(options);
            rzp.on('payment.failed', function (response) {
                alert('Payment failed: ' + response.error.description);
            });
            
            rzp.open();
        }
    </script>

    <!-- Hidden form for payment verification -->
    <form id="paymentForm" th:action="@{/payment/verify}" method="post" style="display: none;">
        <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
        <input type="hidden" name="razorpay_order_id" id="razorpay_order_id">
        <input type="hidden" name="razorpay_signature" id="razorpay_signature">
        <input type="hidden" name="request_id" th:value="${serviceRequest.id}">
    </form>
</body>
</html>
