<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment - Mitra</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .payment-gradient { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .payment-card { border: none; box-shadow: 0 8px 25px rgba(0,0,0,0.1); border-radius: 15px; }
        .payment-method { border: 2px solid #e9ecef; border-radius: 10px; padding: 15px; margin: 10px 0; cursor: pointer; transition: all 0.3s; }
        .payment-method:hover { border-color: #667eea; background: #f8f9ff; }
        .payment-method.selected { border-color: #667eea; background: #f0f4ff; }
        .amount-display { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark payment-gradient">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/user/dashboard">
                <i class="fas fa-home me-2"></i>Mitra
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card payment-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0"><i class="fas fa-credit-card me-2"></i>Payment</h4>
                    </div>
                    <div class="card-body p-4">
                        <div class="amount-display mb-4">
                            <h6 class="mb-2">Amount to Pay</h6>
                            <h2 class="mb-0">₹<span th:text="${amount}"></span></h2>
                        </div>

                        <form th:action="@{/payment/process/{id}(id=${serviceRequest.id})}" method="post">
                            <h6 class="mb-3">Select Payment Method</h6>
                            
                            <div class="payment-method" onclick="selectPaymentMethod('UPI', this)">
                                <input type="radio" name="paymentMethod" value="UPI" id="upi" hidden>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-mobile-alt text-primary fa-2x me-3"></i>
                                    <div>
                                        <strong>UPI Payment</strong>
                                        <br><small class="text-muted">Pay using UPI apps</small>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="payment-method" onclick="selectPaymentMethod('CARD', this)">
                                <input type="radio" name="paymentMethod" value="CARD" id="card" hidden>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-credit-card text-success fa-2x me-3"></i>
                                    <div>
                                        <strong>Card Payment</strong>
                                        <br><small class="text-muted">Debit/Credit Card</small>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="payment-method" onclick="selectPaymentMethod('CASH', this)">
                                <input type="radio" name="paymentMethod" value="CASH" id="cash" hidden>
                                <div class="d-flex align-items-center">
                                    <i class="fas fa-money-bill text-warning fa-2x me-3"></i>
                                    <div>
                                        <strong>Cash Payment</strong>
                                        <br><small class="text-muted">Pay in cash</small>
                                    </div>
                                </div>
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg" id="payButton" disabled>
                                    <i class="fas fa-lock me-2"></i>Pay ₹<span th:text="${amount}"></span>
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function selectPaymentMethod(method, element) {
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            document.getElementById(method.toLowerCase()).checked = true;
            document.getElementById('payButton').disabled = false;
        }
    </script>
</body>
</html>
